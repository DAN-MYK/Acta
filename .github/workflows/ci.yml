name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/acta_ci
  TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/acta_ci
  RUST_FONTCONFIG_DLOPEN: "1"

jobs:
  tests:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acta_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d acta_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config fontconfig libfontconfig-dev libfontconfig1-dev

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features native-tls,postgres

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U postgres -d acta_ci && break
            sleep 2
          done

      - name: Run migrations
        run: sqlx migrate run

      - name: Run unit and integration tests
        run: cargo test --workspace --all-targets

      - name: Validate sqlx metadata
        run: cargo sqlx prepare --check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acta_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d acta_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config fontconfig libfontconfig-dev libfontconfig1-dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features native-tls,postgres

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U postgres -d acta_ci && break
            sleep 2
          done

      - name: Run migrations
        run: sqlx migrate run

      - name: Generate coverage (min 30%)
        run: cargo llvm-cov --workspace --all-targets --fail-under-lines 30 --lcov --output-path lcov.info

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
